replicaCount: 2

image:
  pullPolicy: Always

service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx
  host: dropbox.yourdomain.com
  tls: true
  tlsSecretName: dropbox-tls-secret

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65

persistence:
  size: 20Gi
  storageClass: "standard"

app:
  profile: prod

mysql:
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"