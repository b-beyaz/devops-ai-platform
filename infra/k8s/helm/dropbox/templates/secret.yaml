{{- if .Values.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: dropbox-secret
  labels:
    {{- include "dropbox.labels" . | nindent 4 }}
type: Opaque
# ⚠️  Değerler base64 encode edilmiş olmalı.
# Deploy öncesi şu komutla oluştur (values'a yazma!):
#   kubectl create secret generic dropbox-secret \
#     --from-literal=db-password='Dropbox2024!' \
#     --from-literal=db-root-password='RootPass2024!' \
#     --from-literal=mail-password='X5j13$#eCM1cG@Kdc' \
#     --from-literal=mail-username='javadosyapaylasimi@gmail.com' \
#     -n dropbox --dry-run=client -o yaml | kubectl apply -f -
#
# Bitnami MySQL bu Secret'ı existingSecret ile okur:
#   mysql.auth.existingSecret: dropbox-secret
# Bitnami'nin beklediği key isimleri:
#   mysql-password      → DB kullanıcı şifresi
#   mysql-root-password → root şifresi
stringData:
  # MySQL — Bitnami'nin beklediği key isimleri (değiştirme!)
  mysql-password: {{ required "DB password gerekli: --set dbPassword=..." .Values.dbPassword | quote }}
  mysql-root-password: {{ required "DB root password gerekli: --set dbRootPassword=..." .Values.dbRootPassword | quote }}
  # Mail
  mail-password: {{ required "Mail password gerekli: --set mailPassword=..." .Values.mailPassword | quote }}
  mail-username: {{ required "Mail username gerekli: --set mailUsername=..." .Values.mailUsername | quote }}
{{- end }}