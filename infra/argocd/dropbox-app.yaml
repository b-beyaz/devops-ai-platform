apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dropbox
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/b-beyaz/devops-ai-platform.git
    targetRevision: main
    path: infra/k8s/helm/dropbox
  destination:
    server: https://kubernetes.default.svc
    namespace: dropbox-dev
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true