name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "dockerize-branch" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Date Tag
        id: vars
        run: |
          echo "date_tag=$(date +'%m-%d')" >> $GITHUB_OUTPUT
          echo "build_num=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: aysebeyaz/dropbox:test-build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Image for Vulnerabilities
        run: |
          echo "Şu an sadece simüle ediyoruz: Trivy taraması başarılı."

      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            aysebeyaz/dropbox:latest
            aysebeyaz/dropbox:${{ steps.vars.outputs.date_tag }}.${{ steps.vars.outputs.build_num }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
